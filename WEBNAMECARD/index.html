<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Card - Youngin Lee</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #000; /* 전체 배경 검정 */
        }

        /* 배경 레이어 (다크모드 고정) */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 카드 본체 (다크모드 디자인) */
        .card {
            background: #1e1e1e;
            width: 420px;
            padding: 55px 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            color: white;
        }

        /* 우측 상단 닫기 버튼 모양 */
        .close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #444;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            line-height: 28px;
            cursor: pointer;
            font-size: 14px;
        }

        /* 프로필 이미지 */
        img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #333;
        }

        h1 {
            margin: 18px 0 6px;
            color: white;
        }

        .title {
            color: #ccc;
            margin-bottom: 18px;
            font-size: 18px;
            font-weight: 500;
        }

        /* 안내문 박스 스타일 (다크모드용) */
        .notice {
            background: #2a2a2a;
            border-radius: 14px;
            padding: 16px;
            margin: 10px 0 20px;
            font-size: 13px;
            line-height: 1.6;
            text-align: left;
            color: #eee;
        }

        .notice strong {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #6ea8ff; /* 포인트 컬러 파란색 */
        }

        .qr-box {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #3a3a3a;
            font-size: 12px;
            color: #bbb;
        }

        /* 이메일 텍스트 */
        .email {
            margin: 10px 0;
            font-size: 14px;
            color: #ccc;
        }

        /* 버튼 스타일 */
        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            background: #2d6cdf;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        button:hover {
            background: #1a56c5;
        }

        /* 하단 링크 모음 */
        .links {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .links a {
            text-decoration: none;
            color: #6ea8ff;
            font-size: 14px;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="overlay">
    <div class="card">
        <div class="close">X</div>
        
     <img src="https://github.com/pollyortaki-a11y/webnamecard/blob/main/WEBNAMECARD/profile.jpg?raw=true" alt="Youngin Lee">
        
        <h1>Youngin Lee</h1>
        <div class="title">University Lecturer in Education</div>

        <div class="notice">
            <strong>안내</strong>
            학생분들은 <b>학점, 과제, 시험</b> 관련 문의 사항이 있을 경우 반드시 아래 <b>오픈카카오톡</b>으로 연락주세요.
            <div class="qr-box">
                QR주소: <b>사이버캠퍼스 공지사항 확인</b>
            </div>
        </div>

        <div class="email">pollyortaki@gmail.com</div>
        <button onclick="copyEmail()">이메일 복사</button>

        <div class="links">
            <a href="#">공지사항</a>
            <a href="https://drive.google.com/drive/folders/1VhHWKCqbsrOEPLs0u_tijeUMpELEvkEy?usp=drive_link" target="_blank" rel="noopener noreferrer">수업자료 다운로드</a>
            <a href="https://open.kakao.com/o/sK4705ii" target="_blank" rel="noopener noreferrer">오픈카톡연락처</a>
        </div>
    </div>
</div>

<script>
    // 이메일 복사 기능
    function copyEmail() {
        const emailText = "pollyortaki@gmail.com";
        navigator.clipboard.writeText(emailText).then(() => {
            alert("이메일 주소가 복사되었습니다: " + emailText);
        }).catch(err => {
            console.error('복사 실패:', err);
        });
    }
</script>

</body>
</html>
