 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Web Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* 배경 */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        /* 카드 */
        .card {
            background: #f2f2f2;
            width: 420px;
            padding: 55px 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            position: relative;
            transition: 0.3s;
        }

        /* 닫기 버튼 */
        .close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #999;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            line-height: 28px;
            cursor: pointer;
            font-size: 14px;
        }

        /* 프로필 사진 */
        img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            margin: 18px 0 6px;
        }

        .title {
            color: gray;
            margin-bottom: 18px;
            font-size: 18px;
        }

        /* 안내문 박스 */
        .notice {
            background: #ffffff;
            border-radius: 14px;
            padding: 16px;
            margin: 10px 0 20px;
            font-size: 13px;
            line-height: 1.6;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
            text-align: left;
        }

        .notice strong {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .qr-box {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e5e5e5;
            font-size: 12px;
            color: #444;
        }

        /* 이메일 및 버튼 */
        .email {
            margin: 10px 0;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #2d6cdf;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .links {
            margin-top: 15px;
        }

        .links a {
            margin: 0 10px;
            text-decoration: none;
            color: #2d6cdf;
            font-size: 14px;
        }

        /* 다크모드 설정 */
        .dark-overlay {
            background: rgba(0, 0, 0, 0.9);
        }

        .dark-card {
            background: #1e1e1e;
            color: white;
        }

        .dark-card .title {
            color: #ccc;
        }

        .dark-card .notice {
            background: #2a2a2a;
            box-shadow: none;
        }

        .dark-card .qr-box {
            border-top: 1px solid #3a3a3a;
            color: #ccc;
        }

        .dark-card .links a {
            color: #6ea8ff;
        }
    </style>
</head>
<body>

<div class="overlay">
    <div class="card">
        <div class="close">X</div>
      <img src="./profile.jpg" alt="profile">
        <h1>Youngin Lee</h1>
        <div class="title">University Lecturer in Education</div>

        <div class="notice">
            <strong>안내</strong>
            학생분들은 <b>학점, 과제, 시험</b> 관련 반드시 <b>오픈카카오톡</b>으로 연락주세요.
            <div class="qr-box">
                QR주소: <b>사이버캠퍼스 확인</b>
            </div>
        </div>

        <div class="email">pollyortaki@gmail.com</div>
        <button onclick="copyEmail()">이메일 복사</button>

        <div class="links">
            <a href="#">공지사항</a>
            <a href="#">수업자료 다운로드</a>
            <a href="https://open.kakao.com/o/sK4705ii" target="_blank" rel="noopener noreferrer">오픈카톡연락처</a>
        </div>

        <button onclick="toggleDarkMode()">다크모드 전환</button>
    </div>
</div>

<script>
    function copyEmail() {
        navigator.clipboard.writeText("pollyortaki@gmail.com");
        alert("이메일이 복사되었습니다.");
    }

    function toggleDarkMode() {
        document.querySelector(".overlay").classList.toggle("dark-overlay");
        document.querySelector(".card").classList.toggle("dark-card");
    }
</script>

</body>
</html>
